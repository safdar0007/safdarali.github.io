<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Safdar Ali - Data Scientist & AI/ML Engineer Portfolio" />
    <meta name="keywords" content="Data Scientist, AI Engineer, ML Engineer, Python Developer, Portfolio" />
    <meta name="author" content="Safdar Ali" />
    <title>Safdar Ali | Data Scientist & AI/ML Engineer</title>
    
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <link rel="stylesheet" href="styles.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script defer src="main.js"></script>
  </head>
  <body>
    <div class="scroll-progress" id="scroll-progress"></div>
    <div class="nav-backdrop" id="nav-backdrop"></div>
    <div id="navbar-placeholder"></div>

    <main id="top">
      <div id="hero-placeholder"></div>
      <div id="about-placeholder"></div>
      <div id="skills-placeholder"></div>
      <div id="projects-placeholder"></div>
      <div id="contact-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
      // Simple component loader
      async function loadComponent(id, file) {
        try {
          const res = await fetch(file);
          if (!res.ok) throw new Error(`Failed to load ${file}`);
          const html = await res.text();
          document.getElementById(id).innerHTML = html;
          if (typeof lucide !== 'undefined') lucide.createIcons();
        } catch (err) {
          console.error(`Error loading ${file}:`, err);
        }
      }

      window.addEventListener('DOMContentLoaded', async () => {
        // Load content immediately
        await Promise.all([
          loadComponent('navbar-placeholder', 'navbar.html'),
          loadComponent('hero-placeholder', 'hero.html'),
          loadComponent('about-placeholder', 'about.html'),
          loadComponent('skills-placeholder', 'skills.html'),
          loadComponent('projects-placeholder', 'projects.html'),
          loadComponent('contact-placeholder', 'contact.html'),
          loadComponent('footer-placeholder', 'footer.html')
        ]);
        
        // After components are loaded, ensure main.js logic can run
        // We trigger a custom event if main.js needs to re-initialize
        window.dispatchEvent(new Event('componentsLoaded'));
      });
    </script>
  </body>
</html>
