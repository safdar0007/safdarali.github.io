<section id="contact" class="section">
  <div class="container">
    <div class="section-header">
      <h2>Get In Touch</h2>
      <div class="title-line"></div>
    </div>
    <div class="contact__grid">
      <div class="contact__info">
        <h3 style="margin-bottom: 1.5rem; font-size: 1.8rem; color: var(--txt-pure);">Let's collaborate on your next data project</h3>
        <p style="color: var(--txt-muted); margin-bottom: 2.5rem;">I am always open to discussing new projects, creative ideas or opportunities to be part of your visions.</p>
        
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="skill-icon"><i data-lucide="mail"></i></div>
            <div>
              <h4 style="font-size: 0.9rem; color: var(--txt-muted);">Mail</h4>
              <p style="color: var(--clr-primary);">safdarali67d@gmail.com</p>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="skill-icon"><i data-lucide="phone"></i></div>
            <div>
              <h4 style="font-size: 0.9rem; color: var(--txt-muted);">WhatsApp</h4>
              <p style="color: var(--clr-primary);">+92-3038208446</p>
            </div>
          </div>
        </div>

        <div class="social-links">
          <a href="https://github.com/safdar0007" target="_blank" class="social-icon" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/safdar-ali-ab551a286" target="_blank" class="social-icon" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
          </a>
          <a href="https://web.facebook.com/safdar.ali.878278" target="_blank" class="social-icon" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://wa.link/ew4g6m" target="_blank" class="social-icon" aria-label="WhatsApp">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>

      <form id="contact-form" class="contact__form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your Name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required placeholder="How can I help you?"></textarea>
        </div>
        <button type="submit" class="btn btn--primary" id="form-submit">
          <span>Send Message</span>
          <i data-lucide="send"></i>
        </button>
      </form>
    </div>
  </div>
</section>
